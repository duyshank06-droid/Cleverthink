<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleverThink | Đội ngũ ĐH Bách Khoa TP.HCM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="schedule-section section-bg" id="register">
        <div class="container">
            <div class="section-title">
                <h2>Đăng Ký & Khớp Lịch Học</h2>
                <p>Cung cấp thời gian rảnh của bạn để chúng tôi sắp xếp gia sư phù hợp nhất</p>
            </div>
            
            <div class="registration-layout">
                <form id="registrationForm">
                    <div class="form-group-row">
                        <input type="text" id="stuName" placeholder="Họ và tên học sinh" required>
                        <input type="tel" id="stuPhone" placeholder="Số điện thoại / Zalo" required>
                    </div>
                    <div class="form-group-row">
                        <select id="stuSubject" required>
                            <option value="" disabled selected>Chọn môn học</option>
                            <option value="Tiếng Anh">Tiếng Anh</option>
                            <option value="Vật Lý">Vật Lý</option>
                        </select>
                        <select id="stuClass" required>
                            <option value="" disabled selected>Lớp hiện tại</option>
                            <option value="6">Lớp 6</option>
                            <option value="7">Lớp 7</option>
                            <option value="8">Lớp 8</option>
                            <option value="9">Lớp 9</option>
                            <option value="10">Lớp 10</option>
                            <option value="11">Lớp 11</option>
                            <option value="12">Lớp 12</option>
                        </select>
                    </div>

                    <div class="timetable-picker">
                        <label><strong>Đánh dấu các buổi bạn có thể học:</strong></label>
                        <div class="time-grid" id="timeGrid"></div>
                    </div>

                    <div class="form-group mt-3">
                        <textarea id="stuNote" rows="3" placeholder="Ghi chú thêm (Mục tiêu điểm số, yêu cầu đặc biệt...)"></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mt-2">Gửi đăng ký & Chờ xếp lịch</button>
                </form>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
